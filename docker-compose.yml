# docker-compose.yml
version: '3.8'

services:
  # Frontend React
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_BACKEND_URL=http://localhost:5000
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - idealstampa-network
    restart: unless-stopped

  # Backend Node.js
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5001:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - FRONTEND_URL=http://localhost:3000
      - MONGO_URI=mongodb://${MONGO_ROOT_USER:-idealstampa}:${MONGO_ROOT_PASS:-changeme}@mongo:27017/?authSource=admin
      - MONGO_DB_NAME=${MONGO_DB_NAME:-idealstampa}
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - idealstampa-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # MongoDB
  mongo:
    image: mongo:7
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER:-idealstampa}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASS:-changeme}
      - MONGO_INITDB_DATABASE=${MONGO_DB_NAME:-idealstampa}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - idealstampa-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf           # file principale
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf  # configurazione del sito
      - ./nginx/ssl:/etc/nginx/ssl
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - idealstampa-network
    restart: unless-stopped


networks:
  idealstampa-network:
    driver: bridge

volumes:
  redis_data:
    driver: local
  mongodb_data:
    driver: local